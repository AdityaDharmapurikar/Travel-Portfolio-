<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-link { font-weight: 600; color: #475569; transition: 0.3s; border-bottom: 2px solid transparent; }
        .nav-link:hover { color: #1e40af; border-bottom: 2px solid #1e40af; }
        .gallery-card:hover { transform: scale(1.02); transition: 0.3s; }

<body class="bg-slate-50">
    <nav class="bg-white shadow-sm fixed w-full z-50 py-4 px-12 flex justify-between items-center">
        <div class="text-2xl font-bold text-blue-900">ADITYA</div>

            <div class="p-6">
                <h2 class="text-xl font-bold text-slate-800">Icelandic Solitude</h2>

                <button class="mt-4 text-blue-700 font-bold hover:underline">Read Article →</button>
