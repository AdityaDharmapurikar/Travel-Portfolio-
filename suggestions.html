<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggestions | Aditya Dharmapurikar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>#menu-toggle:checked ~ #mobile-menu { display: block; }</style>
</head>
<body class="bg-slate-50">
    <nav class="bg-white/95 backdrop-blur-md shadow-sm fixed w-full z-50 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="text-xl font-bold text-blue-900 tracking-tighter">ADITYA</div>
        <div class="hidden md:flex space-x-8">
            <a href="index.html" class="font-semibold text-slate-600 hover:text-blue-800">Traveling Stories</a>
            <a href="portfolio.html" class="font-semibold text-slate-600 hover:text-blue-800">Portfolio</a>
            <a href="suggestions.html" class="font-semibold text-blue-800 border-b-2 border-blue-800">Suggestions</a>
            <a href="contact.html" class="font-semibold text-slate-600 hover:text-blue-800">Contact</a>
        </div>
        <label for="menu-toggle" class="md:hidden cursor-pointer text-2xl"><i class="fas fa-bars"></i></label>
    </nav>
    <input type="checkbox" id="menu-toggle" class="hidden">
    <div id="mobile-menu" class="hidden fixed top-[64px] left-0 w-full bg-white shadow-xl z-40 p-6 md:hidden font-bold">
        <a href="index.html" class="block py-2">Traveling Stories</a>
        <a href="portfolio.html" class="block py-2">Portfolio</a>
        <a href="suggestions.html" class="block py-2 text-blue-800">Suggestions</a>
        <a href="contact.html" class="block py-2">Contact</a>
    </div>

    <main class="max-w-3xl mx-auto pt-32 pb-20 px-6">
        <h2 class="text-3xl font-extrabold text-slate-800 mb-2 text-center">Collaborative Stories</h2>
        <p class="text-slate-500 text-center mb-10 italic">Have a story or an edit? Submit it below.</p>
        
        <form action="https://formspree.io/f/mqakvjzl" method="POST" class="bg-white p-6 md:p-10 rounded-3xl shadow-lg space-y-6">
            <input type="hidden" name="_next" value="https://AdityaDharmapurikar.github.io/Travel-Portfolio-/success.html">
            
            <div class="grid md:grid-cols-2 gap-6">
                <input type="text" name="name" placeholder="Name" class="w-full p-4 border rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" required>
                <select name="type" class="w-full p-4 border rounded-xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option>New Story Idea</option>
                    <option>Edit Existing Story</option>
                </select>
            </div>
            <textarea name="message" placeholder="Details of your story or suggestion..." class="w-full p-4 border rounded-xl bg-slate-50 h-44 focus:ring-2 focus:ring-blue-500 outline-none" required></textarea>
            <button type="submit" class="w-full bg-blue-900 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-800 transition">Submit to Aditya</button>
        </form>
    </main>
</body>
</html>
